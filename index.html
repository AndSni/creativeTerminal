<style>

  }
  
  body {
    background-color: var(--term-bg);
    color: var(--term-green);
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    overflow-x: hidden;
  }

  h1 {
    font-size: 2.5rem;
    letter-spacing: 5px;
    text-shadow: var(--term-glow);
    margin-bottom: 2rem;
    text-align: center;
  }

  .machine-container {
    border: 2px solid var(--term-green);
    padding: 2rem;
    border-radius: 5px;
    box-shadow: var(--term-glow);
    background: #000;
  }

  .slots {
    display: flex;
    gap: 15px;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .slot {
    width: 180px;
    height: 120px;
    border: 1px dashed var(--term-green);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #050505;
    position: relative;
  }

  .slot-title {
    position: absolute;
    top: 5px;
    left: 5px;
    font-size: 0.7rem;
    opacity: 0.7;
  }

  .slot-value {
    font-size: 1.2rem;
    font-weight: bold;
    text-align: center;
    padding: 0 10px;
    text-shadow: var(--term-glow);
  }

  .controls {
    display: flex;
    justify-content: center;
  }

  button#lever {
    background: transparent;
    color: var(--term-green);
    border: 2px solid var(--term-green);
    padding: 15px 40px;
    font-size: 1.5rem;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: var(--term-glow);
  }

  button#lever:hover {
    background: var(--term-green);
    color: #000;
  }

  button#lever:disabled {
    border-color: #004411;
    color: #004411;
    box-shadow: none;
    cursor: not-allowed;
    background: transparent;
  }

  .output-area {
    margin-top: 3rem;
    display: flex;
    gap: 10px;
    width: 90%;
    max-width: 800px;
  }

  input#result-text {
    flex-grow: 1;
    background: #000;
    color: var(--term-green);
    border: 1px solid var(--term-green);
    padding: 15px;
    font-family: inherit;
    font-size: 1rem;
    box-shadow: inset var(--term-glow);
  }

  button#copy-btn {
    background: transparent;
    color: var(--term-green);
    border: 1px solid var(--term-green);
    padding: 0 20px;
    font-family: inherit;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  button#copy-btn:hover {
    background: var(--term-green);
    color: #000;
  }
</style>

  // --- APPLICATION LOGIC ---
  const wheels = [subjects, locations, actions, styles];
  const slotElements = [
    document.getElementById('slot1'),
    document.getElementById('slot2'),
    document.getElementById('slot3'),
    document.getElementById('slot4')
  ];
  
  const lever = document.getElementById('lever');
  const resultText = document.getElementById('result-text');
  const copyBtn = document.getElementById('copy-btn');

  let isSpinning = false;

  function getRandomItem(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  lever.addEventListener('click', () => {
    if (isSpinning) return;
    
    isSpinning = true;
    lever.disabled = true;
    lever.innerText = "PROCESSING...";
    resultText.value = "";
    
    const intervals = [];
    const finalValues = [];
    // Staggered stop times so wheels stop one by one (1s, 1.5s, 2s, 2.5s)
    const stopTimes = [1000, 1500, 2000, 2500];

    // Start rapid spinning animation
    slotElements.forEach((slot, index) => {
      intervals[index] = setInterval(() => {
        slot.innerText = getRandomItem(wheels[index]);
      }, 60); 
    });

    // Stop wheels according to schedule
    slotElements.forEach((slot, index) => {
      setTimeout(() => {
        clearInterval(intervals[index]);
        const finalValue = getRandomItem(wheels[index]);
        slot.innerText = finalValue;
        finalValues[index] = finalValue;

        // When the final wheel stops, wrap up
        if (index === slotElements.length - 1) {
          isSpinning = false;
          lever.disabled = false;
          lever.innerText = "EXECUTE SPIN //_";
          resultText.value = finalValues.join(", ");
        }
      }, stopTimes[index]); 
    });
  });

  // Copy to clipboard logic
  copyBtn.addEventListener('click', () => {
    if (!resultText.value) return;
    navigator.clipboard.writeText(resultText.value).then(() => {
      const originalText = copyBtn.innerText;
      copyBtn.innerText = "✔️ COPIED";
      setTimeout(() => copyBtn.innerText = originalText, 2000);
    }).catch(err => {
      console.error('Failed to copy: ', err);
    });
  });
