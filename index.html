<style>
  :root {
    --term-green: #00ff41;
    --term-bg: #0d0d0d;
    --term-glow: 0 0 10px rgba(0, 255, 65, 0.5);
  }
  
  body {
    background-color: var(--term-bg);
    color: var(--term-green);
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    overflow-x: hidden;
  }

  h1 {
    font-size: 2.5rem;
    letter-spacing: 5px;
    text-shadow: var(--term-glow);
    margin-bottom: 2rem;
    text-align: center;
  }

  .machine-container {
    border: 2px solid var(--term-green);
    padding: 2rem;
    border-radius: 5px;
    box-shadow: var(--term-glow);
    background: #000;
  }

  .slots {
    display: flex;
    gap: 15px;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .slot {
    width: 180px;
    height: 120px;
    border: 1px dashed var(--term-green);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #050505;
    position: relative;
  }

  .slot-title {
    position: absolute;
    top: 5px;
    left: 5px;
    font-size: 0.7rem;
    opacity: 0.7;
  }

  .slot-value {
    font-size: 1.2rem;
    font-weight: bold;
    text-align: center;
    padding: 0 10px;
    text-shadow: var(--term-glow);
  }

  .controls {
    display: flex;
    justify-content: center;
  }

  button#lever {
    background: transparent;
    color: var(--term-green);
    border: 2px solid var(--term-green);
    padding: 15px 40px;
    font-size: 1.5rem;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: var(--term-glow);
  }

  button#lever:hover {
    background: var(--term-green);
    color: #000;
  }

  button#lever:disabled {
    border-color: #004411;
    color: #004411;
    box-shadow: none;
    cursor: not-allowed;
    background: transparent;
  }

  .output-area {
    margin-top: 3rem;
    display: flex;
    gap: 10px;
    width: 90%;
    max-width: 800px;
  }

  input#result-text {
    flex-grow: 1;
    background: #000;
    color: var(--term-green);
    border: 1px solid var(--term-green);
    padding: 15px;
    font-family: inherit;
    font-size: 1rem;
    box-shadow: inset var(--term-glow);
  }

  button#copy-btn {
    background: transparent;
    color: var(--term-green);
    border: 1px solid var(--term-green);
    padding: 0 20px;
    font-family: inherit;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  button#copy-btn:hover {
    background: var(--term-green);
    color: #000;
  }
</style>
</head>

  // --- APPLICATION LOGIC ---
  const wheels = [subjects, locations, actions, styles];
  const slotElements = [
    document.getElementById('slot1'),
    document.getElementById('slot2'),
    document.getElementById('slot3'),
    document.getElementById('slot4')
  ];
  
  const lever = document.getElementById('lever');
  const resultText = document.getElementById('result-text');
  const copyBtn = document.getElementById('copy-btn');

  let isSpinning = false;

  // New Cryptographically Secure Random Function
  function getSecureRandomItem(arr) {
    const randomBuffer = new Uint32Array(1);
    window.crypto.getRandomValues(randomBuffer);
    const randomIndex = randomBuffer[0] % arr.length;
    return arr[randomIndex];
  }

  // Load history safely (in case iframes block localStorage)
  let spinHistory = [];
  try {
    const storedHistory = localStorage.getItem('creativeSlotHistory');
    if (storedHistory) {
      spinHistory = JSON.parse(storedHistory);
    }
  } catch (e) {
    console.warn("LocalStorage blocked. Caching disabled for this session.");
  }

  lever.addEventListener('click', () => {
    if (isSpinning) return;
    
    isSpinning = true;
    lever.disabled = true;
    lever.innerText = "PROCESSING...";
    resultText.value = "";
    
    // --- PRE-CALCULATE A GUARANTEED UNIQUE SPIN ---
    let targetValues = [];
    let comboString = "";
    let attempts = 0;

    do {
      targetValues = wheels.map(arr => getSecureRandomItem(arr));
      comboString = targetValues.join(", ");
      attempts++;
    } while (spinHistory.includes(comboString) && attempts < 100);

    // Save unique combo to local storage
    spinHistory.push(comboString);
    if (spinHistory.length > 1000) spinHistory.shift(); // Keep cache limited to last 1000 spins
    
    try {
      localStorage.setItem('creativeSlotHistory', JSON.stringify(spinHistory));
    } catch (e) {}

    // --- EXECUTE VISUAL SPIN ANIMATION ---
    const intervals = [];
    // Staggered stop times so wheels stop one by one (1s, 1.5s, 2s, 2.5s)
    const stopTimes = [1000, 1500, 2000, 2500];

    // Start rapid spinning animation using standard Math.random for visual speed
    slotElements.forEach((slot, index) => {
      intervals[index] = setInterval(() => {
        slot.innerText = wheels[index][Math.floor(Math.random() * wheels[index].length)];
      }, 60); 
    });

    // Stop wheels according to schedule and assign the pre-calculated secure values
    slotElements.forEach((slot, index) => {
      setTimeout(() => {
        clearInterval(intervals[index]);
        slot.innerText = targetValues[index];

        // When the final wheel stops, wrap up
        if (index === slotElements.length - 1) {
          isSpinning = false;
          lever.disabled = false;
          lever.innerText = "EXECUTE SPIN //_";
          resultText.value = comboString;
        }
      }, stopTimes[index]); 
    });
  });

  // Copy to clipboard logic with Iframe Fallback
  copyBtn.addEventListener('click', async () => {
    if (!resultText.value) return;
    
    const originalText = copyBtn.innerText;
    const showSuccess = () => {
      copyBtn.innerText = "✔️ COPIED";
      setTimeout(() => copyBtn.innerText = originalText, 2000);
    };

    try {
      await navigator.clipboard.writeText(resultText.value);
      showSuccess();
    } catch (err) {
      try {
        resultText.select();
        resultText.setSelectionRange(0, 99999); 
        document.execCommand('copy');
        showSuccess();
        window.getSelection().removeAllRanges(); 
      } catch (fallbackErr) {
        console.error('Both copy methods failed: ', fallbackErr);
        copyBtn.innerText = "❌ ERROR";
        setTimeout(() => copyBtn.innerText = originalText, 2000);
      }
    }
  });
